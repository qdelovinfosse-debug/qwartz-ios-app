<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
  <title>QWARTZ ENGINE</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Qwartz">
  <link rel="apple-touch-icon" href="icon-512.png">
  <meta name="theme-color" content="#050505">

  <style>
    :root {
      --bg: #050505;
      --card: #111111;
      --accent: #00d4ff;
      --danger: #ff4d4d;
      --safe-high: #00ff88;
      --safe-med: #a333ff;
      --tabbar-h: calc(56px + env(safe-area-inset-bottom));
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: white;
      font-family: -apple-system, 'SF Pro Display', 'Inter', sans-serif;
      overflow: hidden;
    }

    /* ── Layout ── */
    .screen {
      position: fixed; inset: 0;
      bottom: var(--tabbar-h);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .app {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 16px 24px;
    }

    /* ── Header ── */
    .header {
      padding-top: calc(env(safe-area-inset-top) + 24px);
      padding-bottom: 20px;
      text-align: center;
    }
    .logo {
      font-size: clamp(36px, 11vw, 50px);
      font-weight: 900;
      color: #fff;
      letter-spacing: -3px;
      line-height: 1;
    }
    .logo-sub {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 7px;
      color: var(--accent);
      margin-top: 4px;
    }

    /* ── Search bar ── */
    .search-wrap {
      display: flex;
      margin-bottom: 20px;
    }
    .search-input {
      flex: 1;
      background: #151515;
      border: 1px solid #2a2a2a;
      border-right: none;
      color: white;
      font-size: 16px;
      padding: 14px 16px;
      border-radius: 12px 0 0 12px;
      outline: none;
      -webkit-appearance: none;
    }
    .search-input::placeholder { color: #444; }
    .search-input:focus { border-color: #444; }
    .search-btn {
      background: var(--accent);
      border: none;
      color: #000;
      font-weight: 900;
      font-size: 13px;
      letter-spacing: 0.5px;
      padding: 0 20px;
      border-radius: 0 12px 12px 0;
      cursor: pointer;
      -webkit-appearance: none;
    }
    .search-btn:active { opacity: 0.8; }

    /* ── Result card ── */
    .results-meta { font-size: 11px; color: #444; margin-bottom: 12px; }

    .card {
      background: var(--card);
      border: 1px solid #1e1e1e;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 10px;
    }

    .badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 900;
      padding: 4px 9px;
      border-radius: 5px;
      margin-bottom: 9px;
      letter-spacing: 0.3px;
    }
    .badge-high   { background: var(--safe-high); color: #000; }
    .badge-medium { background: var(--safe-med);  color: #fff; }
    .badge-low    { background: #282828; color: #666; }

    .file-name {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      line-height: 1.35;
      word-break: break-word;
      margin-bottom: 8px;
    }

    .file-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      margin-bottom: 14px;
    }
    .seeds { color: var(--safe-high); font-weight: 800; }
    .sep   { color: #333; }
    .size  { color: #555; }

    .btn-row { display: flex; gap: 8px; }

    .btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 11px 8px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 800;
      border: none;
      cursor: pointer;
      text-decoration: none;
      -webkit-appearance: none;
      letter-spacing: 0.2px;
    }
    .btn:active { opacity: 0.8; }
    .btn-dl     { background: var(--accent); color: #000; }
    .btn-magnet { background: var(--danger); color: #fff; }
    .btn-copied { background: #1a7a3c; color: #fff; }
    .btn-delete { background: #1e1e1e; color: #666; flex: 0 0 44px; padding: 11px 0; }
    .btn-reopen { background: var(--accent); color: #000; }

    /* ── Downloads tab ── */
    .dl-section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #444;
      text-transform: uppercase;
      margin: 18px 0 10px;
    }

    .dl-card {
      background: var(--card);
      border: 1px solid #1e1e1e;
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    .dl-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .dl-name {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      line-height: 1.35;
      word-break: break-word;
      flex: 1;
    }

    .dl-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: #555;
      margin-bottom: 12px;
    }

    .dl-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
    }
    .dl-dot {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── States ── */
    .state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 80px 20px;
      text-align: center;
    }
    .state-icon  { font-size: 48px; }
    .state-title { font-size: 17px; font-weight: 600; color: #444; }
    .state-sub   { font-size: 13px; color: #333; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #222;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Install banner ── */
    .install-banner {
      display: none;
      align-items: center;
      gap: 10px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 18px;
      font-size: 13px;
      color: #aaa;
    }
    .install-banner .arrow { color: var(--accent); font-size: 18px; }
    .install-banner.visible { display: flex; }

    /* ── Tab Bar ── */
    .tabbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--tabbar-h);
      background: rgba(10,10,10,0.95);
      border-top: 1px solid #1e1e1e;
      display: flex;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 100;
    }

    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-bottom: env(safe-area-inset-bottom);
      gap: 4px;
      border: none;
      background: transparent;
      cursor: pointer;
      position: relative;
      -webkit-appearance: none;
    }
    .tab:active { opacity: 0.6; }

    .tab-icon { font-size: 22px; line-height: 1; }
    .tab-label {
      font-size: 10px;
      font-weight: 600;
      color: #555;
      letter-spacing: 0.2px;
    }
    .tab.active .tab-label { color: var(--accent); }
    .tab.active .tab-icon  { filter: drop-shadow(0 0 6px var(--accent)); }

    .tab-badge {
      position: absolute;
      top: 8px;
      right: calc(50% - 18px);
      background: var(--danger);
      color: white;
      font-size: 10px;
      font-weight: 900;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }
    .tab-badge.hidden { display: none; }
  </style>
</head>
<body>

<!-- ══ SCREEN: Recherche ══ -->
<div class="screen" id="screen-search">
  <div class="app">
    <div class="header">
      <div class="logo">QWARTZ</div>
      <div class="logo-sub">ENGINE</div>
    </div>

    <div class="install-banner" id="installBanner">
      <span class="arrow">⬆</span>
      <span>Appuie sur <strong>Partager</strong> puis <strong>"Sur l'écran d'accueil"</strong> pour installer</span>
    </div>

    <div class="search-wrap">
      <input type="search" id="searchInput" class="search-input"
        placeholder="Rechercher..." autocorrect="off" autocapitalize="off" enterkeyhint="search">
      <button class="search-btn" onclick="doSearch()">SEARCH</button>
    </div>

    <div id="content">
      <div class="state">
        <div class="state-icon">✦</div>
        <div class="state-title">Lance une recherche</div>
      </div>
    </div>
  </div>
</div>

<!-- ══ SCREEN: Téléchargements ══ -->
<div class="screen" id="screen-downloads" style="display:none">
  <div class="app">
    <div class="header">
      <div class="logo" style="font-size:clamp(28px,9vw,40px)">TÉLÉCHARGEMENTS</div>
      <div class="logo-sub">HISTORIQUE</div>
    </div>
    <div id="dl-content"></div>
  </div>
</div>

<!-- ══ TAB BAR ══ -->
<div class="tabbar">
  <button class="tab active" id="tab-search" onclick="switchTab('search')">
    <span class="tab-icon">🔍</span>
    <span class="tab-label">Recherche</span>
  </button>
  <button class="tab" id="tab-downloads" onclick="switchTab('downloads')">
    <span class="tab-icon">⬇️</span>
    <span class="tab-label">Téléchargements</span>
    <span class="tab-badge hidden" id="dl-badge">0</span>
  </button>
</div>

<script>
  // ── Service Worker ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  // ── iOS Install Banner ──
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  if (isIOS && !window.navigator.standalone) {
    document.getElementById('installBanner').classList.add('visible');
  }

  // ── State ──
  const input = document.getElementById('searchInput');
  let torrents = [];
  let currentTab = 'search';

  input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  // ── Tab switching ──
  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('screen-search').style.display    = tab === 'search'    ? '' : 'none';
    document.getElementById('screen-downloads').style.display = tab === 'downloads' ? '' : 'none';
    document.getElementById('tab-search').classList.toggle('active',    tab === 'search');
    document.getElementById('tab-downloads').classList.toggle('active', tab === 'downloads');
    if (tab === 'downloads') renderDownloads();
  }

  // ── Helpers ──
  function formatSize(bytes) {
    const n = parseInt(bytes, 10);
    if (isNaN(n)) return 'N/A';
    if (n >= 1073741824) return (n / 1073741824).toFixed(2) + ' Go';
    if (n >= 1048576)    return (n / 1048576).toFixed(2) + ' Mo';
    if (n >= 1024)       return (n / 1024).toFixed(2) + ' Ko';
    return n + ' o';
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function timeAgo(ts) {
    const diff = Math.floor((Date.now() - ts) / 1000);
    if (diff < 60)   return "À l'instant";
    if (diff < 3600) return Math.floor(diff / 60) + ' min';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h';
    return Math.floor(diff / 86400) + 'j';
  }

  // ── Downloads storage ──
  function loadDownloads() {
    try { return JSON.parse(localStorage.getItem('qwartz_downloads') || '[]'); }
    catch { return []; }
  }

  function saveDownloads(list) {
    localStorage.setItem('qwartz_downloads', JSON.stringify(list));
    updateBadge(list.length);
  }

  function addDownload(item) {
    const list = loadDownloads();
    // évite les doublons (même magnet)
    if (list.some(d => d.magnet === item.magnet)) return;
    list.unshift({ ...item, addedAt: Date.now() });
    saveDownloads(list);
    updateBadge(list.length);
  }

  function removeDownload(magnet) {
    const list = loadDownloads().filter(d => d.magnet !== magnet);
    saveDownloads(list);
    renderDownloads();
  }

  function clearDownloads() {
    saveDownloads([]);
    renderDownloads();
  }

  function updateBadge(count) {
    const badge = document.getElementById('dl-badge');
    if (count > 0) { badge.textContent = count; badge.classList.remove('hidden'); }
    else           { badge.classList.add('hidden'); }
  }

  // ── Render downloads ──
  function renderDownloads() {
    const list = loadDownloads();
    const el   = document.getElementById('dl-content');

    if (!list.length) {
      el.innerHTML = `
        <div class="state">
          <div class="state-icon">📭</div>
          <div class="state-title">Aucun téléchargement</div>
          <div class="state-sub">Lance une recherche et appuie sur TÉLÉCHARGER</div>
        </div>`;
      return;
    }

    const cards = list.map((d, idx) => `
      <div class="dl-card" id="dlcard-${idx}">
        <div class="dl-card-top">
          <div class="dl-name">${escHtml(d.name)}</div>
        </div>
        <div class="dl-meta">
          <span class="dl-status"><span class="dl-dot"></span> Envoyé au client</span>
          <span class="sep">•</span>
          <span>${d.size}</span>
          <span class="sep">•</span>
          <span>${timeAgo(d.addedAt)}</span>
        </div>
        <div class="btn-row">
          <a href="${escHtml(d.magnet)}" class="btn btn-reopen">↗ Rouvrir</a>
          <button class="btn btn-delete" onclick="removeDownload('${encodeURIComponent(d.magnet)}')">🗑</button>
        </div>
      </div>`).join('');

    el.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <div class="dl-section-title">${list.length} élément(s)</div>
        <button onclick="clearDownloads()" style="background:none;border:none;color:#555;font-size:12px;cursor:pointer;font-weight:600;">Tout effacer</button>
      </div>
      ${cards}`;
  }

  // ── Fetch via CORS proxy ──
  async function fetchTorrents(q) {
    const apiUrl = 'https://apibay.org/q.php?q=' + encodeURIComponent(q);
    const proxy  = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(apiUrl);
    const res    = await fetch(proxy, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return JSON.parse(await res.text());
  }

  // ── Search ──
  async function doSearch() {
    const q = input.value.trim();
    if (!q) return;
    input.blur();
    const content = document.getElementById('content');

    content.innerHTML = `
      <div class="state">
        <div class="spinner"></div>
        <div class="state-sub">Recherche en cours...</div>
      </div>`;

    try {
      const items = await fetchTorrents(q);

      torrents = items
        .filter(i => i.id !== '0' && parseInt(i.seeders) > 0)
        .slice(0, 40)
        .map(i => {
          const seeds  = parseInt(i.seeders);
          const magnet = 'magnet:?xt=urn:btih:' + i.info_hash + '&dn=' + encodeURIComponent(i.name);
          let badgeClass, badgeLabel;
          if      (i.status === 'vip')     { badgeClass = 'badge-high';   badgeLabel = 'TRÈS SAFE'; }
          else if (i.status === 'trusted') { badgeClass = 'badge-medium'; badgeLabel = 'SAFE'; }
          else                             { badgeClass = 'badge-low';    badgeLabel = 'NON VÉRIFIÉ'; }
          return { name: i.name, seeds, size: formatSize(i.size), magnet, badgeClass, badgeLabel };
        })
        .sort((a, b) => {
          const rank = c => c === 'badge-high' ? 0 : c === 'badge-medium' ? 1 : 2;
          return rank(a.badgeClass) - rank(b.badgeClass) || b.seeds - a.seeds;
        });

      if (!torrents.length) {
        content.innerHTML = `
          <div class="state">
            <div class="state-icon">🔍</div>
            <div class="state-title">Aucun résultat actif</div>
            <div class="state-sub">Essaie un autre terme</div>
          </div>`;
        return;
      }

      renderResults();
    } catch (e) {
      content.innerHTML = `
        <div class="state">
          <div class="state-icon">⚠️</div>
          <div class="state-title">Erreur de connexion</div>
          <div class="state-sub">${escHtml(e.message)}</div>
        </div>`;
    }
  }

  function renderResults() {
    const content = document.getElementById('content');
    const cards = torrents.map((r, idx) => `
      <div class="card">
        <span class="badge ${r.badgeClass}">${r.badgeLabel}</span>
        <div class="file-name">${escHtml(r.name)}</div>
        <div class="file-meta">
          <span class="seeds">▲ ${r.seeds} SEEDS</span>
          <span class="sep">•</span>
          <span class="size">${r.size}</span>
        </div>
        <div class="btn-row">
          <a href="${escHtml(r.magnet)}" class="btn btn-dl" onclick="onDownload(${idx})">⬇ TÉLÉCHARGER</a>
          <button class="btn btn-magnet" id="cp-${idx}" onclick="copyMagnet(${idx})">🧲 MAGNET</button>
        </div>
      </div>`).join('');

    content.innerHTML =
      `<div class="results-meta">${torrents.length} résultat(s) avec seeders actifs</div>` + cards;
  }

  // ── Track download ──
  function onDownload(idx) {
    const r = torrents[idx];
    addDownload({ name: r.name, size: r.size, magnet: r.magnet });
  }

  // ── Copy magnet ──
  function copyMagnet(idx) {
    const text = torrents[idx].magnet;
    const btn  = document.getElementById('cp-' + idx);
    const done = () => {
      btn.textContent = '✓ COPIÉ !';
      btn.classList.replace('btn-magnet', 'btn-copied');
      setTimeout(() => { btn.textContent = '🧲 MAGNET'; btn.classList.replace('btn-copied','btn-magnet'); }, 2000);
    };
    if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
    } else {
      fallbackCopy(text, done);
    }
  }

  function fallbackCopy(text, cb) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    cb();
  }

  // ── removeDownload (appelé depuis HTML généré) ──
  function removeDownload(encodedMagnet) {
    const magnet = decodeURIComponent(encodedMagnet);
    const list = loadDownloads().filter(d => d.magnet !== magnet);
    saveDownloads(list);
    renderDownloads();
  }

  // ── Init badge ──
  updateBadge(loadDownloads().length);
</script>
</body>
</html>
