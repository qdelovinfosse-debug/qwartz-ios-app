name: Qwartz
options:
  bundleIdPrefix: com.qwartz
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: 5.9
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  Qwartz:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Qwartz
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qwartz.app
        INFOPLIST_FILE: Qwartz/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
